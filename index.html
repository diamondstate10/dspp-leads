<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Free Estimate | Diamond State Property Preservation</title>

<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0b0b0b;color:#fff;}
.container{max-width:900px;margin:auto;padding:20px;}
.card{background:#121212;padding:20px;border-radius:12px;margin-bottom:20px;}
h1,h2{text-align:center;}
button{background:#19c37d;color:#000;padding:12px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;width:100%;}
input,select,textarea{width:100%;padding:10px;margin-top:5px;margin-bottom:15px;border-radius:6px;border:1px solid #333;background:#1a1a1a;color:#fff;}
label{font-size:14px;}
.topbar{text-align:center;padding:15px;background:#000;}
.phone{color:#19c37d;font-weight:bold;font-size:18px;}
.alert{display:none;padding:10px;margin-top:10px;border-radius:6px;text-align:center;}
.success{background:#1d4d34;}
.error{background:#4d1d1d;}
</style>
</head>

<body>

<div class="topbar">
<h2>Diamond State Property Preservation</h2>
<div class="phone">Call Now: (302) 275-0673</div>
</div>

<div class="container">

<h1>Request a Free Estimate</h1>

<div class="card">
<form id="leadForm" method="POST" action="https://script.google.com/macros/s/AKfycbyyGiWIUNpTq3AQ1iIJOkThfWQFazMx34To9x8to2GNUX9fVo3qZQMfW_mhF-opfmwK/exec" target="hidden_iframe">
<iframe name="hidden_iframe" style="display:none;"></iframe>
<label>Select Service</label>
<select name="service" required>
<option value="">Choose One</option>
<option value="ROOF">Roof Replacement</option>
<option value="KITCHEN">Kitchen Remodel</option>
<option value="BATH">Bathroom Remodel</option>
</select>

<label>Full Name</label>
<input name="name" required>

<label>Phone</label>
<input name="phone" required>

<label>Email (optional)</label>
<input name="email">

<label>Property Address</label>
<input name="address" required placeholder="Street, City, State, ZIP">

<label>Timeline</label>
<select name="timeline" required>
<option value="">Select One</option>
<option value="ASAP">ASAP</option>
<option value="7D">Within 7 Days</option>
<option value="30D">Within 30 Days</option>
<option value="GT30">More Than 30 Days</option>
</select>

<label>Project Type / Scope</label>
<select name="scope">
<option value="">Select One</option>
<option value="GUT">Full Gut Remodel</option>
<option value="FULL">Full Remodel</option>
<option value="PARTIAL">Partial Remodel</option>
<option value="COUNTERTOPS">Countertops Only</option>
<option value="COSMETIC">Cosmetic Refresh</option>
<option value="INS_APPROVED">Insurance Approved (Roof)</option>
<option value="INS_PENDING">Insurance Pending (Roof)</option>
<option value="RETAIL">Retail Roof Replacement</option>
<option value="REPAIR">Roof Repair</option>
<option value="DIY">DIY</option>
</select>

<label>Budget Range</label>
<select name="budget_range">
<option value="">Select One</option>
<option value="HIGH">High / Full Budget</option>
<option value="MID">Mid Range</option>
<option value="UNSURE">Not Sure</option>
<option value="LOW">Low Budget</option>
</select>

<label>Project Details</label>
<textarea name="details"></textarea>

<button type="submit">Get My Free Quote</button>

<div id="success" class="alert success">Request received! We will contact you shortly.</div>
<div id="error" class="alert error">Something went wrong. Please call (302) 275-0673.</div>

</form>
</div>
</div>

<script>
  const form = document.getElementById("leadForm");
  const success = document.getElementById("success");
  const error = document.getElementById("error");

  form.addEventListener("submit", function() {
    success.style.display = "none";
    error.style.display = "none";

    // show success after short delay (iframe submit)
    setTimeout(() => {
      success.style.display = "block";
      form.reset();
    }, 900);
  });
</script>
